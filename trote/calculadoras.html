</head>

<body>

    <header>
        Trote Solidário 2025

    <nav>
        <div id="links-menu">
            <a href="index.html"> Home </a>

        <img class="logo_trote" src="images/trote.jpg" alt="Trote Solidário" height=120px width=120px/>

    </nav>

    <div class="container">
        <h2> Calculadoras </h2>
        <form>

            <div class="campos">
                <label> Selecione a cor da equipe: </label>
                <select id="equipe">
                    <option value="Laranja"> Laranja </option>
                    <option value="Preta"> Preta </option>
                    <option value="Roxa"> Roxa </option>
                    <option value="Verde"> Verde </option>
                    <option value="Vermelha"> Vermelha </option>
                </select>
            </div>

            <div class="campos">
                <label> Mascote do Time </label>
                <input type="number" id="mascote"/>
            </div>
            <div class="campos">
                <label> Homenagem a um atleta </label>
                <input type="number" id="homenagem"/>
            </div>
            <div class="campos">
                <label> Quantidade de Litros de Leite </label>
                <input type="number" id="leite"/>
            </div>
            <div class="campos">
                <label> Kit de Alimentação </label>
                <input type="number" id="kit"/>
            </div>
            <div class="campos">
                <label> Suplemento </label>
                <input type="number" id="suplemento"/>
            </div>
            <div class="campos">
                <label> Doação de Sangue </label>
                <input type="number" id="sangue"/>
            </div>
            <div class="campos">
                <button type="button" id="botao_calculadora" onclick="calcular()"> Calcular </button>
                <label id="soma"> </label>  
            </div> 

        </form>
    </div>

</body>
